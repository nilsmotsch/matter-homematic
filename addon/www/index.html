<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matter Homematic</title>
  <script>
    // The matter-homematic web UI runs on its own port (default 8080).
    // Redirect there from the CCU's WebUI tile, using the same hostname
    // the user typed to reach the CCU.
    var port = 8080;
    var target = window.location.protocol + "//" + window.location.hostname + ":" + port + "/";
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Opening Matter-Homematic configuration&hellip;</p>
  <p>If you are not redirected automatically, click
    <a id="link" href="#">here</a>.
  </p>
  <script>
    document.getElementById("link").href = target;
  </script>
</body>
</html>
